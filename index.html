<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #2b0a66;
      --bg-b: #0b3d91;
      --bg-c: #0f766e;
      --card: rgba(14, 8, 35, 0.6);
      --text: #fdf4ff;
      --muted: #e9d5ff;
      --accent: #ff4ecd;
      --accent-second: #22d3ee;
      --line: rgba(255, 255, 255, 0.28);
      --item-bg: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Manrope", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(130deg, var(--bg-a), var(--bg-b), var(--bg-c));
      background-size: 180% 180%;
      animation: moveBg 14s ease infinite;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      filter: blur(12px);
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      background: radial-gradient(circle, rgba(255, 78, 205, 0.55) 0%, rgba(255, 78, 205, 0) 70%);
      top: -120px;
      left: -90px;
      animation: floatBlob 8s ease-in-out infinite;
    }

    body::after {
      background: radial-gradient(circle, rgba(34, 211, 238, 0.45) 0%, rgba(34, 211, 238, 0) 70%);
      right: -100px;
      bottom: -130px;
      animation: floatBlob 10s ease-in-out infinite reverse;
    }

    .card {
      width: min(700px, 100%);
      border-radius: 22px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(16, 8, 40, 0.55);
      backdrop-filter: blur(10px);
      animation: cardIn 700ms ease-out;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 600;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    li {
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--item-bg);
      border: 1px solid var(--line);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: itemIn 500ms ease forwards;
      font-weight: 600;
    }

    li:nth-child(1) { animation-delay: 120ms; }
    li:nth-child(2) { animation-delay: 240ms; }
    li:nth-child(3) { animation-delay: 360ms; }

    li:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: var(--accent);
      background: linear-gradient(120deg, rgba(255, 78, 205, 0.28), rgba(34, 211, 238, 0.22));
      box-shadow: 0 8px 22px rgba(255, 78, 205, 0.2);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes itemIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes moveBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(18px, -12px); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Быстрые подсказки для контента на сегодня и на неделю.</p>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи для сторис на сегодня</li>
      <li>Контент-план на неделю</li>
    </ul>
  </main>
</body>
</html>
